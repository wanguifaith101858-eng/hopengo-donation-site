<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | HopeBridge</title>
    <meta name="description" content="Secure admin access for HopeBridge NGO operations." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body class="bg-slate-100 text-slate-800">
    <div class="flex min-h-screen items-center justify-center px-6 py-16">
      <div class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-lg">
        <div class="flex items-center gap-3">
          <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-teal-600">
            <svg viewBox="0 0 64 64" class="h-6 w-6" aria-hidden="true">
              <rect width="64" height="64" rx="14" fill="#0f766e"></rect>
              <path d="M18 30c0-8 6-14 14-14s14 6 14 14-6 14-14 14-14-6-14-14Zm12-8c-3 0-5 2-5 5v3h-3v4h3v6h4v-6h4v-4h-4v-3c0-1 1-2 2-2h4v-4h-4Z" fill="#fef3c7"></path>
            </svg>
          </span>
          <div>
            <h1 class="text-2xl font-semibold">Admin Access</h1>
            <p class="text-sm text-slate-600">Restricted to super administrators</p>
          </div>
        </div>

        <form id="adminLoginForm" class="mt-8" novalidate>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700" for="adminEmail">Email</label>
            <input id="adminEmail" name="adminEmail" type="email" class="input" placeholder="superadmin@hopebridge.org" />
          </div>
          <div class="mt-5">
            <label class="mb-2 block text-sm font-medium text-slate-700" for="adminPassword">Password</label>
            <input id="adminPassword" name="adminPassword" type="password" class="input" placeholder="admin1234" />
          </div>
          <button type="submit" class="mt-8 w-full rounded-full bg-teal-700 px-6 py-3 font-semibold text-white transition hover:bg-teal-800">
            Sign In
          </button>
          <p id="adminError" class="mt-4 hidden rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"></p>
          <p class="mt-4 text-sm text-slate-600">Demo credentials: superadmin@hopebridge.org / admin1234</p>
          <a href="../index.html" class="mt-4 inline-block text-sm font-semibold text-teal-700">Back to public site</a>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
